services:
    wemx:
        build:
            context: .
            dockerfile: .docker/Dockerfile
        container_name: ${APP_NAME:-WemX}
        restart: always
        tty: true
        stdin_open: true
        volumes:
            - ./:/app
        environment:
            DOMAIN: ${DOMAIN:-localhost}
            VERSION: ${VERSION:-latest}
            TYPE: ${TYPE}
            APP_NAME: ${APP_NAME:-WemX}
            APP_ENV: ${APP_ENV:-production}
            APP_DEBUG: ${APP_DEBUG:-false}
# If not using Traefik, comment out the ports section
#        ports:
#            -  ${APP_PORT:-80}:80
#            -  ${APP_PORT_SSL:-443}:443
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.${APP_NAME:-WemX}.entrypoints=http"
            - "traefik.http.routers.${APP_NAME:-WemX}.rule=Host(`${DOMAIN}`)"
            - "traefik.http.middlewares.${APP_NAME:-WemX}-https-redirect.redirectscheme.scheme=https"
            - "traefik.http.routers.${APP_NAME:-WemX}.middlewares=${APP_NAME:-WemX}-https-redirect"
            - "traefik.http.routers.${APP_NAME:-WemX}-secure.entrypoints=https"
            - "traefik.http.routers.${APP_NAME:-WemX}-secure.rule=Host(`${DOMAIN}`)"
            - "traefik.http.routers.${APP_NAME:-WemX}-secure.tls=true"
            - "traefik.http.routers.${APP_NAME:-WemX}-secure.tls.certresolver=letsencrypt"
            - "traefik.http.routers.${APP_NAME:-WemX}-secure.service=${APP_NAME}"
            - "traefik.http.services.${APP_NAME:-WemX}.loadbalancer.server.port=80"
        networks:
#           This is for Traefik. Traefik network name
            - proxy

networks:
    proxy:
        external: true
